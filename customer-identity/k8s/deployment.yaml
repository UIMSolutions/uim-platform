apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer-identity
  namespace: uim-platform
  labels:
    app: customer-identity
    part-of: uim-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: customer-identity
  template:
    metadata:
      labels:
        app: customer-identity
    spec:
      containers:
      - name: customer-identity
        image: uim-platform/customer-identity:latest
        ports:
        - containerPort: 8119
          protocol: TCP
        envFrom:
        - configMapRef:
            name: customer-identity-config
        livenessProbe:
          httpGet:
            path: /health
            port: 8119
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8119
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
