apiVersion: apps/v1
kind: Deployment
metadata:
  name: uim-rfc
  labels:
    app: uim-rfc
    component: platform-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: uim-rfc
  template:
    metadata:
      labels:
        app: uim-rfc
    spec:
      containers:
      - name: uim-rfc
        image: uim-rfc-platform-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8092
          protocol: TCP
        envFrom:
        - configMapRef:
            name: rfc-config
        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: 8092
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/v1/health
            port: 8092
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        securityContext:
          runAsNonRoot: true
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
      restartPolicy: Always
