apiVersion: apps/v1
kind: Deployment
metadata:
  name: keystore
  labels:
    app: keystore
    part-of: uim-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keystore
  template:
    metadata:
      labels:
        app: keystore
    spec:
      containers:
      - name: keystore
        image: uim-platform/keystore:latest
        ports:
        - containerPort: 8115
          protocol: TCP
        envFrom:
        - configMapRef:
            name: keystore-config
        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: 8115
          initialDelaySeconds: 5
          periodSeconds: 30
          timeoutSeconds: 3
        readinessProbe:
          httpGet:
            path: /api/v1/health
            port: 8115
          initialDelaySeconds: 3
          periodSeconds: 10
          timeoutSeconds: 3
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        securityContext:
          runAsNonRoot: true
          readOnlyRootFilesystem: true
