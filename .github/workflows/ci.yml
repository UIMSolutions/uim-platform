name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-library:
    name: Build uim-platform-analytics
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dc: [dmd-latest, ldc-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup D compiler
        uses: dlang-community/setup-dlang@v2
        with:
          compiler: ${{ matrix.dc }}

      - name: Build root package
        run: dub build

      - name: Test root package
        run: dub test

  build-analytics:
    name: Build Analytics Service
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dc: [dmd-latest, ldc-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup D compiler
        uses: dlang-community/setup-dlang@v2
        with:
          compiler: ${{ matrix.dc }}

      - name: Build analytics
        run: dub build
        working-directory: analytics

  build-identity-authentication:
    name: Build Identity Authentication Service
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dc: [dmd-latest, ldc-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup D compiler
        uses: dlang-community/setup-dlang@v2
        with:
          compiler: ${{ matrix.dc }}

      - name: Build identity-authentication
        run: dub build
        working-directory: identity-authentication
