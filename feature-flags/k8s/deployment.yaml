apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloud-feature-flags
  labels:
    app: cloud-feature-flags
    tier: platform-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloud-feature-flags
  template:
    metadata:
      labels:
        app: cloud-feature-flags
        tier: platform-service
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: cloud-feature-flags
        image: uim-feature-flags-platform-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8097
          name: http
        envFrom:
        - configMapRef:
            name: feature-flags-config
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: 8097
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/v1/health
            port: 8097
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: [ "ALL" ]
        volumeMounts:
        - name: flag-data
          mountPath: /data/feature-flags
      volumes:
      - name: flag-data
        emptyDir: {}
