apiVersion: apps/v1
kind: Deployment
metadata:
  name: uim-build-code
  namespace: uim-platform
  labels:
    app: uim-build-code
    version: "1.0.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: uim-build-code
  template:
    metadata:
      labels:
        app: uim-build-code
        version: "1.0.0"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
      containers:
      - name: uim-build-code
        image: uim-build-code-platform-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8098
          protocol: TCP
        envFrom:
        - configMapRef:
            name: build-code-config
        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: 8098
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/v1/health
            port: 8098
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
      restartPolicy: Always
