apiVersion: apps/v1
kind: Deployment
metadata:
  name: credential-store
  labels:
    app: credential-store
    part-of: uim-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: credential-store
  template:
    metadata:
      labels:
        app: credential-store
    spec:
      containers:
      - name: credential-store
        image: uim-platform/credential-store:latest
        ports:
        - containerPort: 8095
          protocol: TCP
        envFrom:
        - configMapRef:
            name: credential-store-config
        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: 8095
          initialDelaySeconds: 5
          periodSeconds: 30
          timeoutSeconds: 3
        readinessProbe:
          httpGet:
            path: /api/v1/health
            port: 8095
          initialDelaySeconds: 3
          periodSeconds: 10
          timeoutSeconds: 3
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        securityContext:
          runAsNonRoot: true
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
