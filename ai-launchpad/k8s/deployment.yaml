apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-launchpad
  labels:
    app: ai-launchpad
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-launchpad
  template:
    metadata:
      labels:
        app: ai-launchpad
    spec:
      containers:
      - name: ai-launchpad
        image: uim-ai-launchpad:latest
        ports:
        - containerPort: 8097
          protocol: TCP
        envFrom:
        - configMapRef:
            name: ai-launchpad-config
        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: 8097
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /api/v1/health
            port: 8097
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        securityContext:
          runAsNonRoot: true
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
