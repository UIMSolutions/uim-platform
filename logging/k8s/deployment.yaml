apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloud-logging
  labels:
    app: cloud-logging
    part-of: uim-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloud-logging
  template:
    metadata:
      labels:
        app: cloud-logging
    spec:
      containers:
        - name: cloud-logging
          image: uim-platform/cloud-logging:latest
          ports:
            - containerPort: 8094
              protocol: TCP
          envFrom:
            - configMapRef:
                name: cloud-logging-config
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8094
            initialDelaySeconds: 5
            periodSeconds: 30
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8094
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 3
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
