apiVersion: apps/v1
kind: Deployment
metadata:
  name: build-apps
  namespace: uim-platform
  labels:
    app: build-apps
    part-of: uim-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: build-apps
  template:
    metadata:
      labels:
        app: build-apps
    spec:
      containers:
      - name: build-apps
        image: uim-platform/build-apps:latest
        ports:
        - containerPort: 8112
          protocol: TCP
        envFrom:
        - configMapRef:
            name: build-apps-config
        livenessProbe:
          httpGet:
            path: /health
            port: 8112
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8112
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
