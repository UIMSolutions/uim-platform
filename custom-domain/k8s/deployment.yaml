apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloud-custom-domain
  labels:
    app: cloud-custom-domain
    part-of: uim-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloud-custom-domain
  template:
    metadata:
      labels:
        app: cloud-custom-domain
    spec:
      containers:
      - name: cloud-custom-domain
        image: uim-platform/cloud-custom-domain:latest
        ports:
        - containerPort: 8101
          protocol: TCP
        envFrom:
        - configMapRef:
            name: cloud-custom-domain-config
        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: 8101
          initialDelaySeconds: 5
          periodSeconds: 30
          timeoutSeconds: 3
        readinessProbe:
          httpGet:
            path: /api/v1/health
            port: 8101
          initialDelaySeconds: 3
          periodSeconds: 10
          timeoutSeconds: 3
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        securityContext:
          runAsNonRoot: true
          readOnlyRootFilesystem: true
