apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloud-hana-spatial
  labels:
    app: cloud-hana-spatial
    component: spatial-services
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloud-hana-spatial
  template:
    metadata:
      labels:
        app: cloud-hana-spatial
        component: spatial-services
        tier: backend
    spec:
      containers:
      - name: cloud-hana-spatial
        image: uim-platform/hana-spatial:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8098
          name: http
          protocol: TCP
        envFrom:
        - configMapRef:
            name: cloud-hana-spatial-config
        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: 8098
          initialDelaySeconds: 15
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/v1/health
            port: 8098
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "500m"
