apiVersion: apps/v1
kind: Deployment
metadata:
  name: health-fhir
  labels:
    app: health-fhir
    layer: platform
    fhir: "R4"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: health-fhir
  template:
    metadata:
      labels:
        app: health-fhir
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
      - name: health-fhir
        image: uim-platform/health-fhir:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8097
          name: http
        envFrom:
        - configMapRef:
            name: health-fhir-config
        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: 8097
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /api/v1/health
            port: 8097
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL
