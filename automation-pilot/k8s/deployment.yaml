apiVersion: apps/v1
kind: Deployment
metadata:
  name: automation-pilot
  namespace: uim-platform
  labels:
    app: automation-pilot
    part-of: uim-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: automation-pilot
  template:
    metadata:
      labels:
        app: automation-pilot
    spec:
      containers:
      - name: automation-pilot
        image: uim-platform/automation-pilot:latest
        ports:
        - containerPort: 8110
          protocol: TCP
        envFrom:
        - configMapRef:
            name: automation-pilot-config
        livenessProbe:
          httpGet:
            path: /health
            port: 8110
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8110
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
