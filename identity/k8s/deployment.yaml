---
apiVersion: v1
kind: Namespace
metadata:
  name: uim-platform
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity
  namespace: uim-platform
  labels:
    app: identity
    component: cloud-identity-services
spec:
  replicas: 1
  selector:
    matchLabels:
      app: identity
  template:
    metadata:
      labels:
        app: identity
        component: cloud-identity-services
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: identity
        image: uim-platform/identity:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8121
          protocol: TCP
        envFrom:
        - configMapRef:
            name: identity-config
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: 8121
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/v1/health
            port: 8121
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 2
        volumeMounts:
        - name: data
          mountPath: /data/identity
      volumes:
      - name: data
        emptyDir: {}
