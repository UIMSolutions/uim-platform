apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-center
  namespace: uim-platform
  labels:
    app: task-center
    part-of: uim-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: task-center
  template:
    metadata:
      labels:
        app: task-center
    spec:
      containers:
      - name: task-center
        image: uim-platform/task-center:latest
        ports:
        - containerPort: 8103
          protocol: TCP
        envFrom:
        - configMapRef:
            name: task-center-config
        livenessProbe:
          httpGet:
            path: /health
            port: 8103
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8103
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
