apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloud-alert-notification
  labels:
    app: cloud-alert-notification
    tier: platform-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloud-alert-notification
  template:
    metadata:
      labels:
        app: cloud-alert-notification
        tier: platform-service
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: cloud-alert-notification
        image: uim-alert-notification-platform-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8095
          name: http
        envFrom:
        - configMapRef:
            name: alert-notification-config
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: 8095
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/v1/health
            port: 8095
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: [ "ALL" ]
