apiVersion: apps/v1
kind: Deployment
metadata:
  name: uim-ui-flexibility
  labels:
    app: uim-ui-flexibility
    component: platform-service
    version: "2.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: uim-ui-flexibility
  template:
    metadata:
      labels:
        app: uim-ui-flexibility
        component: platform-service
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
      - name: uim-ui-flexibility
        image: uim-ui-flexibility-platform-service:2.0.0
        ports:
        - name: http
          containerPort: 8098
          protocol: TCP
        envFrom:
        - configMapRef:
            name: ui-flexibility-config
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: 8098
          initialDelaySeconds: 15
          periodSeconds: 20
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/v1/health
            port: 8098
          initialDelaySeconds: 5
          periodSeconds: 10
          failureThreshold: 3
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
