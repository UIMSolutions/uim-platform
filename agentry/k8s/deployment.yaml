apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentry
  namespace: uim-platform
  labels:
    app: agentry
    part-of: uim-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agentry
  template:
    metadata:
      labels:
        app: agentry
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
      containers:
      - name: agentry
        image: uim-platform/agentry:latest
        ports:
        - containerPort: 8117
          protocol: TCP
        envFrom:
        - configMapRef:
            name: agentry-config
        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: 8117
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /api/v1/health
            port: 8117
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
