apiVersion: apps/v1
kind: Deployment
metadata:
  name: transport
  namespace: uim-platform
  labels:
    app: transport
    part-of: uim-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: transport
  template:
    metadata:
      labels:
        app: transport
    spec:
      containers:
      - name: transport
        image: uim-platform/transport:latest
        ports:
        - containerPort: 8117
          protocol: TCP
        envFrom:
        - configMapRef:
            name: transport-config
        livenessProbe:
          httpGet:
            path: /health
            port: 8117
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8117
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
