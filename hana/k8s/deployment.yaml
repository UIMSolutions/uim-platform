apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloud-hana
  labels:
    app: cloud-hana
    part-of: uim-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloud-hana
  template:
    metadata:
      labels:
        app: cloud-hana
    spec:
      containers:
      - name: cloud-hana
        image: uim-platform/cloud-hana:latest
        ports:
        - containerPort: 8097
          protocol: TCP
        envFrom:
        - configMapRef:
            name: cloud-hana-config
        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: 8097
          initialDelaySeconds: 5
          periodSeconds: 30
          timeoutSeconds: 3
        readinessProbe:
          httpGet:
            path: /api/v1/health
            port: 8097
          initialDelaySeconds: 3
          periodSeconds: 10
          timeoutSeconds: 3
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        securityContext:
          runAsNonRoot: true
          readOnlyRootFilesystem: true
