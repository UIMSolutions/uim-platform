apiVersion: apps/v1
kind: Deployment
metadata:
  name: authorization-trust
  labels:
    app: authorization-trust
    part-of: uim-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: authorization-trust
  template:
    metadata:
      labels:
        app: authorization-trust
    spec:
      containers:
      - name: authorization-trust
        image: uim-platform/authorization-trust:latest
        ports:
        - containerPort: 8116
          protocol: TCP
        envFrom:
        - configMapRef:
            name: authorization-trust-config
        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: 8116
          initialDelaySeconds: 5
          periodSeconds: 30
          timeoutSeconds: 3
        readinessProbe:
          httpGet:
            path: /api/v1/health
            port: 8116
          initialDelaySeconds: 3
          periodSeconds: 10
          timeoutSeconds: 3
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        securityContext:
          runAsNonRoot: true
          readOnlyRootFilesystem: true
