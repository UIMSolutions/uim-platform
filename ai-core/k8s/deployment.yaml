apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-core
  labels:
    app: ai-core
    part-of: uim-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-core
  template:
    metadata:
      labels:
        app: ai-core
    spec:
      containers:
      - name: ai-core
        image: uim-platform/ai-core:latest
        ports:
        - containerPort: 8090
          protocol: TCP
        envFrom:
        - configMapRef:
            name: ai-core-config
        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: 8090
          initialDelaySeconds: 5
          periodSeconds: 30
          timeoutSeconds: 3
        readinessProbe:
          httpGet:
            path: /api/v1/health
            port: 8090
          initialDelaySeconds: 3
          periodSeconds: 10
          timeoutSeconds: 3
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        securityContext:
          runAsNonRoot: true
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
